<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeatTheMeet</title>
    <meta property="og:title" content="BeatTheMeet" />
    <meta
      property="og:description"
      content="stop texting 'when r u free'. create a poll. share a link. done. 🦕"
    />
    <meta property="og:image" content="https://beatthemeet.com/og-image.png" />
    <meta property="og:url" content="https://beatthemeet.com" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BeatTheMeet" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BeatTheMeet" />
    <meta
      name="twitter:description"
      content="stop texting 'when r u free'. create a poll. share a link. done. 🦕"
    />
    <meta name="twitter:image" content="https://beatthemeet.com/og-image.png" />
  </head>
  <body>
    <div
      id="init-check"
      style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #6d28d9;
        color: white;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 13px;
        font-family: system-ui;
        z-index: 9999;
      "
    >
      Loading...
    </div>
    <script>
      setTimeout(function () {
        var el = document.getElementById("init-check");
        if (el) el.style.display = "none";
      }, 3000);
    </script>
    <script>
      window.addEventListener("unhandledrejection", function (e) {
        document.body.innerHTML +=
          '<div style="position:fixed;bottom:0;left:0;right:0;background:red;color:white;padding:16px;font-size:13px;font-family:monospace;z-index:99999;word-break:break-all">' +
          "PROMISE ERROR: " +
          (e.reason?.message || e.reason || "unknown") +
          "</div>";
      });
      window.addEventListener("error", function (e) {
        document.body.innerHTML +=
          '<div style="position:fixed;bottom:0;left:0;right:0;background:darkred;color:white;padding:16px;font-size:13px;font-family:monospace;z-index:99999;word-break:break-all">' +
          "JS ERROR: " +
          e.message +
          " at " +
          e.filename +
          ":" +
          e.lineno +
          "</div>";
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
